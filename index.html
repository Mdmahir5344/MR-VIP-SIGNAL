<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MR  VIP V1 - JACKPOT SPECIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff41; --danger: #ff0000; --gold: #ffff00; --bg: #020205; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: var(--bg); font-family: 'Rajdhani', sans-serif; color: #fff; }

        /* Welcome Screen */
        #welcomeScreen { position: fixed; inset: 0; background: linear-gradient(45deg, var(--danger), var(--gold), var(--danger)); z-index: 20000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .welcome-title { font-size: 35px; font-weight: 900; font-family: 'Orbitron'; color: #000; text-shadow: 0 0 15px #fff; }

        /* Bottom Navigation */
        #bottomNav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); display: flex; z-index: 10000; border-top: 1px solid #333; }
        .nav-btn { flex: 1; border: none; background: transparent; color: #888; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .nav-btn.active { color: var(--gold); }
        .nav-btn span { font-size: 18px; margin-bottom: 3px; }

        /* Content Area */
        #mainContent { position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 70px); }
        .page { position: absolute; inset: 0; display: none; overflow-y: auto; padding-bottom: 20px; }
        .page.active { display: block; }
        .bg-grid { position: fixed; inset: 0; background: linear-gradient(transparent 95%, rgba(255,0,0,0.05) 50%), linear-gradient(90deg, transparent 95%, rgba(255,255,0,0.05) 50%); background-size: 30px 30px; z-index: -1; }

        iframe { width: 100%; height: 100%; border: none; }

        /* Boxes */
        .glass-box { background: rgba(10, 5, 5, 0.95); border-radius: 25px; padding: 25px; border: 2px solid var(--gold); box-shadow: 0 15px 40px rgba(255,0,0,0.2); text-align: center; margin: 20px auto; width: 90%; max-width: 400px; }
        .header-logo { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--gold); margin-bottom: 10px; }

        .market-toggle { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .m-btn { padding: 8px 15px; border: 1px solid var(--neon); background: transparent; color: var(--neon); border-radius: 10px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .m-btn.active { background: var(--neon); color: #000; }

        .res-text { font-size: 34px; font-weight: 900; text-shadow: 0 0 15px var(--neon); margin: 10px 0; color: #fff; }
        .main-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--gold); color: #000; font-weight: bold; cursor: pointer; }

        /* History Status Styles */
        .history-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        .history-table th { color: #555; padding: 10px; border-bottom: 1px solid #222; }
        .history-table td { padding: 10px 5px; border-bottom: 1px solid #111; text-align: center; font-weight: bold; }
        
        .win { color: var(--neon); }
        .loss { color: var(--danger); }
        .jackpot { color: var(--gold); text-shadow: 0 0 10px var(--gold); animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.6; } }

        /* Step Calculator */
        input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--danger); border-radius: 10px; color: #fff; margin-bottom: 15px; text-align: center; outline: none; }
        .step-row { border-bottom: 1px solid #222; padding: 8px 0; display: flex; justify-content: space-between; font-size: 14px; }
    </style>
</head>
<body>

<div id="welcomeScreen">
    <div class="welcome-title">MR VIP TEAM</div>
    <p style="color:#000; font-weight:bold; margin-top:5px;">JACKPOT DETECTION SYSTEM</p>
</div>

<div id="mainContent">
    <div class="bg-grid"></div>

    <!-- GAME PAGE -->
    <div id="gamePage" class="page active">
        <!-- আপনার নতুন গেম লিঙ্ক এখানে দেওয়া হয়েছে -->
        <iframe src="https://www.amarclub8.com/#/register?invitationCode=684831297173"></iframe>
    </div>

    <!-- AI PREDICTION PAGE -->
    <div id="aiPage" class="page">
        <div class="glass-box" id="loginBox">
            <img src="https://i.supaimg.com/f8daed7c-ae46-45e9-891b-7521b725fd69/d2a7db41-b49d-44c4-b5ba-7e148f1f66dc.jpg">
            <h2 style="font-family:'Orbitron'; color:var(--gold); margin-bottom:20px; font-size:18px;">AI PREDICTOR</h2>
            <input type="password" id="passInput" placeholder="ACCESS KEY">
            <button class="main-btn" onclick="checkLogin()">LOGIN SYSTEM</button>
        </div>

        <div class="glass-box" id="signalSection" style="display:none;">
            <div class="market-toggle">
                <button class="m-btn active" id="m1" onclick="switchMarket('1M')">WINGO 1M</button>
                <button class="m-btn" id="m30" onclick="switchMarket('30S')">WINGO 30S</button>
            </div>
            <div id="prd_id" style="color:#666; font-size:13px; font-weight: bold;">PERIOD: ---</div>
            <div id="res_text" class="res-text">WAITING</div>
            <div style="font-size:14px; color:var(--gold); font-weight: bold;" id="timer">TIME: 00s</div>
        </div>
    </div>

    <!-- HISTORY PAGE -->
    <div id="historyPage" class="page">
        <div class="glass-box">
            <h2 style="font-family:'Orbitron'; color:var(--gold); margin-bottom:15px; font-size:16px;">SIGNAL HISTORY</h2>
            <table class="history-table">
                <thead><tr><th>PRD</th><th>PRED</th><th>RES</th><th>STATUS</th></tr></thead>
                <tbody id="logs"></tbody>
            </table>
        </div>
    </div>

    <!-- STEP PAGE -->
    <div id="stepPage" class="page">
        <div class="glass-box">
            <h2 style="font-family:'Orbitron'; color:var(--gold); margin-bottom:20px; font-size:16px;">STEP CALCULATOR</h2>
            <input type="number" id="stepBal" placeholder="ENTER BALANCE (EX: 1210)">
            <button class="main-btn" onclick="calculateSteps()">CALCULATE PLAN</button>
            <div id="stepList" style="margin-top:15px; text-align:left;"></div>
        </div>
    </div>
</div>

<div id="bottomNav">
    <button class="nav-btn active" onclick="showPage('gamePage', this)"><span>🎮</span>GAME</button>
    <button class="nav-btn" onclick="showPage('aiPage', this)"><span>🚀</span>AI HACK</button>
    <button class="nav-btn" onclick="showPage('historyPage', this)"><span>📜</span>HISTORY</button>
    <button class="nav-btn" onclick="showPage('stepPage', this)"><span>📊</span>STEPS</button>
</div>

<script>
    setTimeout(() => { document.getElementById("welcomeScreen").style.display = "none"; }, 3000);

    function showPage(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        btn.classList.add('active');
    }

    const PASS = "mrtm007";
    let currentMarket = "1M";
    let lastIssue = null, savedSize = null, savedNums = [];

    function switchMarket(m) {
        currentMarket = m;
        document.getElementById("m1").classList.toggle("active", m === "1M");
        document.getElementById("m30").classList.toggle("active", m === "30S");
        lastIssue = null;
        document.getElementById("res_text").innerText = "WAITING";
    }

    function speak(t) {
        window.speechSynthesis.cancel();
        let m = new SpeechSynthesisUtterance(t);
        m.lang = 'bn-BD'; m.rate = 1.0;
        window.speechSynthesis.speak(m);
    }

    function checkLogin() {
        if(document.getElementById("passInput").value === PASS) {
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("signalSection").style.display = "block";
            speak("আসসালামু আলাইকুম। 3 x ভি আই পি টিমে স্বাগতম।");
            setInterval(runAI, 3000);
        } else alert("WRONG KEY!");
    }

    async function runAI() {
        try {
            const api = currentMarket === "1M" ? "WinGo_1M" : "WinGo_30S";
            const res = await fetch(`https://draw.ar-lottery01.com/WinGo/${api}/GetHistoryIssuePage.json`);
            const data = await res.json();
            const latest = data.data.list[0];
            const history = data.data.list.slice(0, 10).map(x => parseInt(x.number));

            let seconds = new Date().getSeconds();
            let timerVal = currentMarket === "1M" ? (60 - seconds) : (30 - (seconds % 30));
            document.getElementById("timer").innerText = "TIME: " + timerVal.toString().padStart(2, '0') + "s";
            document.getElementById("prd_id").innerText = "PERIOD: " + (BigInt(latest.issueNumber) + 1n);

            // Simple Logic
            let bigCount = history.filter(x => x > 4).length;
            let nextSize = (bigCount >= 5) ? "SMALL" : "BIG";
            if(history[0] === history[1]) nextSize = (history[0] > 4) ? "BIG" : "SMALL";

            let n1 = (history[0] + 4) % 10, n2 = (history[0] + 8) % 10;

            if (lastIssue !== latest.issueNumber) {
                if (lastIssue !== null) {
                    let aNum = parseInt(latest.number);
                    let aSize = aNum <= 4 ? "SMALL" : "BIG";
                    
                    // JACKPOT Logic: Check if Number matches
                    let isNumWin = savedNums.includes(aNum);
                    let isSizeWin = (savedSize === aSize);
                    
                    let status = "LOSS ❌", sClass = "loss";

                    if (isNumWin) {
                        status = "JACKPOT 💎"; sClass = "jackpot";
                        speak("জ্যাকপট! নাম্বার সহ উইন হয়েছে।");
                    } else if (isSizeWin) {
                        status = "WIN 🧡"; sClass = "win";
                        speak("আলহামদুলিল্লাহ উইন।");
                    } else {
                        speak("লস হয়েছে। ৫ স্টেপ মেনটেইন করুন।");
                    }
                    
                    let row = `<tr>
                        <td>${latest.issueNumber.slice(-3)}</td>
                        <td>${savedSize} (${savedNums.join(",")})</td>
                        <td>${aNum}</td>
                        <td class="${sClass}">${status}</td>
                    </tr>`;
                    document.getElementById("logs").innerHTML = row + document.getElementById("logs").innerHTML;
                }
                
                lastIssue = latest.issueNumber;
                savedSize = nextSize;
                savedNums = [n1, n2];
                document.getElementById("res_text").innerText = nextSize + " (" + n1 + "," + n2 + ")";
                
                setTimeout(() => {
                    speak(`পরবর্তী শট ${nextSize == "BIG" ? "বিগ" : "স্মল"}। সংখ্যা ${n1} এবং ${n2}।`);
                }, 4000);
            }
        } catch (e) {}
    }

    function calculateSteps() {
        let b = parseFloat(document.getElementById('stepBal').value);
        if(!b) return alert("ENTER BALANCE!");
        let output = "";
        let unit = Math.floor(b / 121);
        let steps = [1, 3, 9, 27, 81];
        for(let i=0; i<5; i++) {
            output += `<div class="step-row"><span>Step ${i+1}:</span> <span>${unit * steps[i]} TK</span></div>`;
        }
        document.getElementById('stepList').innerHTML = output;
    }
</script>
</body>
      </html>
